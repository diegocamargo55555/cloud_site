<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contato - KickStream</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <header>
        <a href="index.html" class="logo">KICKSTREAM</a>
        <nav>
            <ul>
                <li><a href="index.html">Início</a></li>
                <li><a href="sobre.html">Sobre</a></li>
                <li><a href="contato.html" class="active">Contato</a></li>
            </ul>
        </nav>
    </header>

    <div class="page-container">
        <h1>Entre em Contato</h1>
        <p style="margin-bottom: 30px;">Tem dúvidas, sugestões ou quer ser um parceiro de transmissão? Mande uma mensagem para a nossa equipe!</p>
        
        <form onsubmit="alert('Mensagem enviada com sucesso!'); return false;">
            <div class="form-group">
                <label for="nome">Nome Completo</label>
                <input type="text" id="nome" required placeholder="Digite seu nome">
            </div>
            <div class="form-group">
                <label for="email">E-mail</label>
                <input type="email" id="email" required placeholder="Digite seu e-mail">
            </div>
            <div class="form-group">
                <label for="mensagem">Mensagem</label>
                <textarea id="mensagem" rows="5" required placeholder="Como podemos ajudar?"></textarea>
            </div>
            <button type="submit" class="btn-submit">Enviar Mensagem</button>
        </form>
    </div>

    <footer style="text-align: center; padding: 40px; color: #777; margin-top: auto;">
        <p>&copy; 2024 KickStream.</p>
    </footer>
</body>
</html>
